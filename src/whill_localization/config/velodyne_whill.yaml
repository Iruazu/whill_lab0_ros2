# FAST-LIO config for the WHILL chair stack.
#
# Built by combining:
#   - the noetic-era values from whill_lab0/FAST_LIO/config/velodyne.yaml
#     (extrinsics, IMU noise, lidar geometry — see
#     docs/m3-extrinsics-from-noetic.md)
#   - the M3-confirmed topic names (/velodyne_points, /imu/data_raw)
#   - upstream FAST-LIO ROS2 defaults for everything else.
#
# The upstream ROS2 default config (`fast_lio/config/velodyne.yaml`) ships
# with `imu_topic: /imu/data` and `scan_line: 32`, neither of which fits
# our hardware; overrides for those two are the most important diff to
# look at when debugging.

/**:
    ros__parameters:
        feature_extract_enable: false
        point_filter_num: 4
        max_iteration: 3
        filter_size_surf: 0.5
        filter_size_map: 0.5
        cube_side_length: 200.0           # reduced from upstream 1000.0 because that causes "Leaf size is too small for the input dataset. Integer indices would overflow." in pcl::VoxelGrid::applyFilter (1000^3 / 0.5^3 voxels = 8e9 > INT32_MAX). 200^3 keeps the count well under int32. Visible symptom of the overflow is FAST-LIO dropping into a "No Effective Points!" loop with no pose updates.
        runtime_pos_log_enable: false
        map_file_path: "/home/systemlab/whill_lab0_ros2/docs/m5-maps/lab.pcd"

        common:
            # M5-e WIP (2026-05-20): the naive z-only filter on
            # /velodyne_points_filtered also stripped legitimate floor / lower-
            # wall returns that FAST-LIO needs for scan registration —
            # "No Effective Points!" floods within a second and base_link
            # drifts unbounded. FAST-LIO stays on /velodyne_points (raw) for
            # now; the filter is still launched so we can compare the two
            # topics side-by-side in RViz before deciding on the final
            # geometry of the self-exclusion mask.
            lid_topic: "/velodyne_points"
            imu_topic: "/imu/data_raw"
            time_sync_en: false
            time_offset_lidar_to_imu: 0.0

        preprocess:
            lidar_type: 2                # 2 = Velodyne
            scan_line: 16                # VLP-16
            scan_rate: 10                # Hz
            timestamp_unit: 0            # 0=second; matches the velodyne ROS2 driver output (see docs/m3-bench-data/README.md)
            blind: 0.5                   # ignore returns within 0.5 m (inherited from noetic tuning)

        mapping:
            # IMU noise covariances. Loosened from upstream defaults
            # (0.1 / 0.1) to give the iESKF room to absorb the higher
            # angular rates that a chair-mounted joystick spin produces.
            # With the default 0.1 / 0.1 the filter over-trusts its
            # predicted orientation and registration fails ~30 s into a
            # drive that includes a sharp turn (run2 replay 2026-05-08).
            acc_cov: 0.1
            gyr_cov: 0.5
            b_acc_cov: 0.0001
            b_gyr_cov: 0.0001
            fov_degree: 180.0            # front hemisphere only — the back half of the VLP-16 sweep sees the chair body and seated user, both of which are rigidly attached to the LiDAR and would corrupt the world map. Initial 360.0 caused divergence within ~30 s of replay (see docs/m4-...). The noetic stack used 180.0 for the same reason.
            det_range: 100.0
            extrinsic_est_en: false      # match the noetic default — let FAST-LIO trust the initial values rather than refining online. The values below were calibrated by the noetic-era lab and are still valid because the LiDAR / IMU mounting on the chair has not been physically changed (user confirmed 2026-05-08).
            # Inherited LiDAR <-> IMU extrinsic from the noetic stack — see
            # docs/m3-extrinsics-from-noetic.md. Translation = LiDAR origin
            # in IMU frame; rotation = LiDAR -> IMU.
            extrinsic_T: [0.104136, 0.411548, 0.323704]
            extrinsic_R: [ 0.987688,  0.000000,  0.156434,
                          -0.005459,  0.999391,  0.034470,
                          -0.156339, -0.034900,  0.987087]

        publish:
            path_en: true                # enabled so we can visualise the trajectory in RViz
            scan_publish_en: true
            dense_publish_en: true
            scan_bodyframe_pub_en: true
            map_en: true                 # required for /map_save service to have data: when true, publish_map() runs each scan and accumulates the world-frame points into pcl_wait_pub. The /map_save service then pcd_writer's pcl_wait_pub to map_file_path. (Upstream FAST-LIO leaves this off by default and the historical pcd_save_en write path in publish_frame_world is commented out, so this is the only way to actually save a PCD without forking the source.)

        pcd_save:
            pcd_save_en: true            # M5-b: save all accumulated points to a single PCD on shutdown for offline conversion to a 2D occupancy grid. The actual write happens in FAST-LIO's signal handler so launches must be SIGINT-stopped, not SIGKILL'd.
            interval: -1                 # -1 = accumulate the entire run into one file
